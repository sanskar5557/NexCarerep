<!DOCTYPE html>
<!-- NexCare Auth Page -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCare | Login & Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2ECC71;
            --primary-blue: #3498DB;
            --primary-dark: #2C3E50;
            --bg-soft-white: #F8FAFC;
            --bg-white: #FFFFFF;
            --bg-light-blue: #EBF5FB;
            --bg-light-green: #EAFAF1;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --border-color: #E2E8F0;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.07);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #0e4d3a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(52,152,219,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
            border-radius: 50%;
            animation: blobFloat 8s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(46,204,113,0.12) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            border-radius: 50%;
            animation: blobFloat 10s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-20px) scale(1.05); }
            66% { transform: translate(-20px,30px) scale(0.97); }
        }

        /* Top Nav */
        .auth-nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 1.2rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .logo-dot {
            width: 12px; height: 12px;
            background: var(--primary-green);
            border-radius: 50%;
        }
        .logo-text span { color: var(--primary-blue); }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .back-link:hover { color: white; }

        /* Main container */
        .auth-wrapper {
            width: 100%;
            max-width: 1100px;
            margin-top: 5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Divider */
        .auth-divider {
            position: absolute;
            left: 50%;
            top: 10%;
            bottom: 10%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-50%);
            pointer-events: none;
        }

        /* Cards */
        .auth-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            transition: var(--transition);
            animation: slideUp 0.6s ease forwards;
            opacity: 0;
        }

        .auth-card.login-card { animation-delay: 0.1s; }
        .auth-card.signup-card { animation-delay: 0.25s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card:hover {
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 24px 48px rgba(0,0,0,0.3);
        }

        /* Card Header */
        .card-header { margin-bottom: 2rem; }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .badge-blue { background: rgba(52,152,219,0.2); color: #5dade2; border: 1px solid rgba(52,152,219,0.3); }
        .badge-green { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }

        .card-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }

        .card-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }

        /* Form Styles */
        .form-group { margin-bottom: 1.2rem; }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.4rem;
            letter-spacing: 0.04em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
            transition: var(--transition);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 0.92rem;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .form-input::placeholder { color: rgba(255,255,255,0.25); }

        .form-input:focus {
            border-color: var(--primary-blue);
            background: rgba(52,152,219,0.08);
            box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
        }

        .form-input:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--primary-blue);
        }

        /* Password toggle */
        .pw-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            padding: 2px;
        }
        .pw-toggle:hover { color: rgba(255,255,255,0.7); }

        /* Name row */
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

        /* Role selector */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .role-option { display: none; }

        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            transition: var(--transition);
        }

        .role-label i { font-size: 1.2rem; }

        .role-option:checked + .role-label {
            border-color: var(--primary-green);
            color: var(--primary-green);
            background: rgba(46,204,113,0.1);
        }

        /* Form extras */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.4rem;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-wrap input[type="checkbox"] {
            accent-color: var(--primary-blue);
            width: 14px; height: 14px;
        }

        .remember-wrap label {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.82rem;
            color: var(--primary-blue);
            text-decoration: none;
            transition: var(--transition);
        }
        .forgot-link:hover { color: #5dade2; text-decoration: underline; }

        /* Submit Buttons */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-blue), #2471a3);
            color: white;
            box-shadow: 0 4px 20px rgba(52,152,219,0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(52,152,219,0.5);
        }

        .btn-signup {
            background: linear-gradient(135deg, var(--primary-green), #27ae60);
            color: white;
            box-shadow: 0 4px 20px rgba(46,204,113,0.4);
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(46,204,113,0.5);
        }

        .btn-submit:active { transform: translateY(0); }

        /* Ripple */
        .btn-submit::after {
            content: '';
            position: absolute;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: translate(-50%,-50%);
            transition: width 0.4s, height 0.4s, opacity 0.4s;
            opacity: 0;
        }
        .btn-submit:active::after {
            width: 300px; height: 300px;
            opacity: 1;
        }

        /* Divider text */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.2rem 0;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .or-divider span {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.3);
            font-weight: 500;
        }

        /* Social buttons */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.7rem;
        }

        .btn-social {
            padding: 0.65rem;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.7);
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
            color: white;
        }

        /* Terms */
        .terms-text {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 1rem;
            line-height: 1.5;
        }
        .terms-text a { color: var(--primary-green); text-decoration: none; }
        .terms-text a:hover { text-decoration: underline; }

        /* Password strength */
        .strength-bar-wrap { margin-top: 6px; display: flex; gap: 4px; }
        .strength-seg {
            flex: 1; height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            transition: var(--transition);
        }
        .strength-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-wrapper {
                grid-template-columns: 1fr;
                max-width: 480px;
            }
            .auth-divider { display: none; }
            .auth-nav { padding: 1rem 1.5rem; }
            .name-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 1.8rem 1.4rem; }
            .card-title { font-size: 1.5rem; }
            .social-row { grid-template-columns: 1fr; }
        }

        /* Auth messages */
        .auth-msg {
            margin-top: 0.8rem;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: fadeIn 0.3s ease;
        }
        .auth-msg.error {
            display: flex;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #f87171;
        }
        .auth-msg.success {
            display: flex;
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.4);
            color: #2ecc71;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-4px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Top Nav -->
    <nav class="auth-nav">
        <a href="index.html" class="logo-text">
            <div class="logo-dot"></div>Nex<span>Care</span>
        </a>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </nav>

    <!-- Auth Panel -->
    <div class="auth-wrapper">

        <!-- Divider Line -->
        <div class="auth-divider"></div>

        <!-- ===== LOGIN CARD ===== -->
        <div class="auth-card login-card">
            <div class="card-header">
                <div class="card-badge badge-blue">
                    <i class="fas fa-right-to-bracket"></i> Welcome Back
                </div>
                <h1 class="card-title">Sign In</h1>
                <p class="card-subtitle">Access your NexCare dashboard</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('login-password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="remember-wrap">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit btn-login">
                    <i class="fas fa-right-to-bracket"></i> Login to NexCare
                </button>
                <div class="auth-msg" id="login-msg"></div>
            </form>

            <div class="or-divider"><span>or continue with</span></div>

            <div class="social-row">
                <button class="btn-social" onclick="socialAuth('Google')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="btn-social" onclick="socialAuth('Apple')">
                    <i class="fab fa-apple"></i> Apple
                </button>
            </div>
        </div>

        <!-- ===== SIGN UP CARD ===== -->
        <div class="auth-card signup-card">
            <div class="card-header">
                <div class="card-badge badge-green">
                    <i class="fas fa-user-plus"></i> New Account
                </div>
                <h1 class="card-title">Create Account</h1>
                <p class="card-subtitle">Join thousands on NexCare today</p>
            </div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <!-- Role -->
                <div class="form-group">
                    <label class="form-label">I am a...</label>
                    <div class="role-selector">
                        <input type="radio" name="role" id="role-patient" class="role-option" value="patient" checked>
                        <label class="role-label" for="role-patient">
                            <i class="fas fa-user-injured"></i> Patient
                        </label>
                        <input type="radio" name="role" id="role-doctor" class="role-option" value="doctor">
                        <label class="role-label" for="role-doctor">
                            <i class="fas fa-user-doctor"></i> Doctor
                        </label>
                    </div>
                </div>

                <!-- Name Row -->
                <div class="name-row">
                    <div class="form-group">
                        <label class="form-label" for="signup-fname">First Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="signup-fname" class="form-input" placeholder="Alex" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-lname">Last Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="signup-lname" class="form-input" placeholder="Rivera" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-email">Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-phone">Phone Number</label>
                    <div class="input-wrap">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="signup-phone" class="form-input" placeholder="+91 98765 43210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signup-password" class="form-input" placeholder="Create a strong password" required oninput="checkStrength(this.value)">
                        <button type="button" class="pw-toggle" onclick="togglePw('signup-password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="strength-bar-wrap">
                        <div class="strength-seg" id="seg1"></div>
                        <div class="strength-seg" id="seg2"></div>
                        <div class="strength-seg" id="seg3"></div>
                        <div class="strength-seg" id="seg4"></div>
                    </div>
                    <p class="strength-label" id="strength-label">Enter a password</p>
                </div>

                <button type="submit" class="btn-submit btn-signup">
                    <i class="fas fa-user-plus"></i> Create My Account
                </button>
                <div class="auth-msg" id="signup-msg"></div>
            </form>

            <p class="terms-text">
                By signing up, you agree to our
                <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
            </p>
        </div>

    </div>

    <script>
        // ---- Helpers ----
        function showMsg(id, type, text) {
            const el = document.getElementById(id);
            el.className = 'auth-msg ' + type;
            el.innerHTML = (type === 'error' ? '<i class="fas fa-circle-exclamation"></i> ' : '<i class="fas fa-circle-check"></i> ') + text;
        }
        function hideMsg(id) {
            const el = document.getElementById(id);
            el.className = 'auth-msg';
            el.textContent = '';
        }

        // ---- Registry helpers ----
        function getRegistry() {
            return JSON.parse(localStorage.getItem('nexcare_registry') || '{}');
        }
        function saveRegistry(reg) {
            localStorage.setItem('nexcare_registry', JSON.stringify(reg));
        }

        // Toggle password visibility
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Password strength checker
        function checkStrength(val) {
            const segs = ['seg1','seg2','seg3','seg4'].map(id => document.getElementById(id));
            const label = document.getElementById('strength-label');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
            const labels = ['Weak','Fair','Good','Strong'];
            segs.forEach((s,i) => {
                s.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,0.1)';
            });
            label.textContent = val.length === 0 ? 'Enter a password' : (labels[score-1] || 'Too short');
            label.style.color  = score > 0 ? colors[score-1] : 'rgba(255,255,255,0.35)';
        }

        // ---- LOGIN ----
        function handleLogin(e) {
            e.preventDefault();
            hideMsg('login-msg');
            const btn      = e.target.querySelector('.btn-submit');
            const email    = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            const registry = getRegistry();

            // Check if user exists
            if (!registry[email]) {
                showMsg('login-msg', 'error', 'No account found. Please sign up first.');
                return;
            }
            // Check password
            if (registry[email].password !== password) {
                showMsg('login-msg', 'error', 'Incorrect password. Please try again.');
                return;
            }

            // Credentials valid
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled  = true;

            const user = { ...registry[email] };
            delete user.password; // don't store plain password in session

            setTimeout(() => {
                localStorage.setItem('nexcare_user', JSON.stringify(user));
                localStorage.setItem('nexcare_logged_in', 'true');
                btn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
                btn.style.background = 'linear-gradient(135deg,#2ecc71,#27ae60)';
                setTimeout(() => { window.location.href = 'index.html'; }, 900);
            }, 1200);
        }

        // ---- SIGN UP ----
        function handleSignup(e) {
            e.preventDefault();
            hideMsg('signup-msg');
            const btn      = e.target.querySelector('.btn-submit');
            const email    = document.getElementById('signup-email').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value;
            const registry = getRegistry();

            // Check duplicate email
            if (registry[email]) {
                showMsg('signup-msg', 'error', 'An account with this email already exists. Please log in.');
                return;
            }
            // Minimum password length
            if (password.length < 6) {
                showMsg('signup-msg', 'error', 'Password must be at least 6 characters.');
                return;
            }

            const role = document.querySelector('input[name="role"]:checked').value;
            const userData = {
                firstName: document.getElementById('signup-fname').value.trim(),
                lastName:  document.getElementById('signup-lname').value.trim(),
                email:     email,
                phone:     document.getElementById('signup-phone').value.trim(),
                role:      role.charAt(0).toUpperCase() + role.slice(1),
                joined:    new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),
                password:  password  // stored only in registry
            };

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled  = true;

            setTimeout(() => {
                // Save to registry
                registry[email] = userData;
                saveRegistry(registry);

                // Log in immediately
                const session = { ...userData };
                delete session.password;
                localStorage.setItem('nexcare_user', JSON.stringify(session));
                localStorage.setItem('nexcare_logged_in', 'true');

                btn.innerHTML = '<i class="fas fa-check"></i> Account Created!';
                btn.style.background = 'linear-gradient(135deg,#3498db,#2471a3)';
                showMsg('signup-msg', 'success', 'Account created! Redirecting...');
                setTimeout(() => { window.location.href = 'index.html'; }, 900);
            }, 1400);
        }

        // Social auth placeholder
        function socialAuth(provider) {
            alert(provider + ' authentication coming soon!');
        }
    </script>
</body>
</html>
